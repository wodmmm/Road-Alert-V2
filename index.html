<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Road Alert | Driver</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap');

        :root {
            --bg:        #080d14;
            --panel:     rgba(10, 20, 35, 0.85);
            --border:    rgba(0, 200, 255, 0.15);
            --accent:    #00c8ff;
            --green:     #00ff88;
            --amber:     #ffaa00;
            --red:       #ff2244;
            --text:      #d0e8f0;
            --dim:       rgba(208, 232, 240, 0.4);
            --font-hud:  'Rajdhani', sans-serif;
            --font-mono: 'Share Tech Mono', monospace;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-hud);
            background: var(--bg);
            color: var(--text);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Scanline overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.04) 2px,
                rgba(0,0,0,0.04) 4px
            );
            pointer-events: none;
            z-index: 9999;
        }

        /* Grid background */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,200,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,200,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        /* ===== STARTUP SCREEN ===== */
        #startup {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            z-index: 500;
            transition: opacity 0.6s ease;
        }

        .startup-logo {
            font-size: 1rem;
            letter-spacing: 8px;
            color: var(--dim);
            text-transform: uppercase;
            font-family: var(--font-mono);
        }

        .startup-title {
            font-size: 3rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 0 0 30px rgba(0,200,255,0.5);
        }

        .startup-sub {
            font-size: 0.85rem;
            color: var(--dim);
            letter-spacing: 2px;
            text-align: center;
            max-width: 280px;
            line-height: 1.8;
        }

        #start-btn {
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
            padding: 1rem 3rem;
            font-family: var(--font-hud);
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: color 0.3s, box-shadow 0.3s;
        }

        #start-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--accent);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s ease;
            z-index: -1;
        }

        #start-btn:hover {
            color: var(--bg);
            box-shadow: 0 0 30px rgba(0,200,255,0.4);
        }
        #start-btn:hover::before { transform: scaleX(1); }
        #start-btn:active { transform: scale(0.97); }

        /* ===== HUD MAIN ===== */
        #hud {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 1rem;
            gap: 0.75rem;
            position: relative;
            z-index: 1;
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        #hud.visible { opacity: 1; }

        /* Top status bar */
        .status-bar {
            display: flex;
            gap: 0.5rem;
            justify-content: space-between;
        }

        .pill {
            flex: 1;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 0.5rem 0.75rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.2rem;
        }

        .pill-label {
            font-family: var(--font-mono);
            font-size: 0.55rem;
            color: var(--dim);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .pill-value {
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .status-ok    { color: var(--green); }
        .status-warn  { color: var(--amber); }
        .status-err   { color: var(--red);   }
        .status-idle  { color: var(--dim);   }

        /* Radar area */
        #radar-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        #radar-canvas {
            width: min(100%, 340px);
            aspect-ratio: 1;
        }

        /* VRU count badge */
        #vru-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 0.3rem 0.6rem;
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--dim);
        }

        #vru-badge span { color: var(--accent); font-size: 1rem; font-weight: bold; }

        /* Log strip */
        #log {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 0.5rem 0.75rem;
            font-family: var(--font-mono);
            font-size: 0.65rem;
            color: var(--dim);
            height: 2.5rem;
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        /* ===== ALERT OVERLAY ===== */
        #alert-overlay {
            position: fixed;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 900;
            transition: opacity 0.2s;
        }

        #alert-overlay.show { display: flex; }

        .alert-bg {
            position: absolute;
            inset: 0;
            background: rgba(255, 20, 50, 0.92);
            animation: alertPulse 0.8s ease-in-out infinite;
        }

        @keyframes alertPulse {
            0%,100% { opacity: 0.88; }
            50%      { opacity: 1; }
        }

        .alert-content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            padding: 2rem;
            text-align: center;
        }

        .alert-icon-big {
            font-size: 5rem;
            line-height: 1;
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.5));
            animation: iconBounce 0.6s ease-in-out infinite alternate;
        }

        @keyframes iconBounce {
            from { transform: scale(1); }
            to   { transform: scale(1.08); }
        }

        .alert-type {
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 2px 10px rgba(0,0,0,0.4);
        }

        .alert-distance {
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: 2px;
            opacity: 0.95;
        }

        .alert-direction {
            font-family: var(--font-mono);
            font-size: 0.9rem;
            opacity: 0.8;
            letter-spacing: 2px;
            margin-top: 0.5rem;
        }

        .alert-dismiss {
            margin-top: 1.5rem;
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.6);
            color: white;
            padding: 0.6rem 2rem;
            font-family: var(--font-hud);
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 4px;
        }
        .alert-dismiss:active { transform: scale(0.96); }

        /* Countdown ring on dismiss btn */
        .countdown-bar {
            height: 3px;
            background: rgba(255,255,255,0.3);
            width: 100%;
            margin-top: 0.5rem;
            border-radius: 2px;
            overflow: hidden;
        }
        .countdown-fill {
            height: 100%;
            background: white;
            width: 100%;
            transition: width linear;
        }
    </style>
</head>
<body>

<!-- ===== STARTUP ===== -->
<div id="startup">
    <div class="startup-logo">v0.3.1 · UK</div>
    <div class="startup-title">Road Alert</div>
    <div class="startup-sub">
        Vulnerable road user detection.<br>
        Keep your phone audio connected<br>
        to your vehicle before starting.
    </div>
    <button id="start-btn" onclick="startApp()">Activate</button>
</div>

<!-- ===== HUD ===== -->
<div id="hud">
    <div class="status-bar">
        <div class="pill">
            <span class="pill-label">Network</span>
            <span id="s-mqtt" class="pill-value status-idle">—</span>
        </div>
        <div class="pill">
            <span class="pill-label">GPS</span>
            <span id="s-gps" class="pill-value status-idle">—</span>
        </div>
        <div class="pill">
            <span class="pill-label">Speed</span>
            <span id="s-speed" class="pill-value status-idle">— mph</span>
        </div>
        <div class="pill">
            <span class="pill-label">Heading</span>
            <span id="s-heading" class="pill-value status-idle">—°</span>
        </div>
    </div>

    <div id="radar-wrap">
        <canvas id="radar-canvas"></canvas>
        <div id="vru-badge">VRUs: <span id="vru-count">0</span></div>
    </div>

    <div id="log">Waiting for activation...</div>
</div>

<!-- ===== ALERT OVERLAY ===== -->
<div id="alert-overlay">
    <div class="alert-bg"></div>
    <div class="alert-content">
        <div id="alert-icon" class="alert-icon-big">🐴</div>
        <div id="alert-type" class="alert-type">Horse Ahead</div>
        <div id="alert-distance" class="alert-distance">-- m</div>
        <div id="alert-direction" class="alert-direction"></div>
        <button class="alert-dismiss" onclick="dismissAlert()">Acknowledge</button>
        <div class="countdown-bar"><div id="countdown-fill" class="countdown-fill"></div></div>
    </div>
</div>

<script>
// ================================================================
//  CONFIGURATION
// ================================================================
const CONFIG = {
    mqtt: {
        host:      'broker.hivemq.com',
        port:      8884,
        path:      '/mqtt',
        topic:     'roadalert/telemetry',
        useSSL:    true,
        reconnectDelay: 5000,
    },
    alert: {
        radiusMeters:    500,   // Alert when VRU is within this distance
        approachAngle:   90,    // Degrees either side of forward heading to consider "ahead"
        cooldownMs:      120000, // 2 min cooldown per VRU before re-alerting
        vruTtlMs:        45000,  // Remove VRU if no update received within 45s
        autoDismissMs:   12000,  // Auto-dismiss alert after 12s
        speedGateKph:    10,     // Don't alert if driver is below this speed (e.g. in traffic)
        minApproachSpeed: 0,     // Future: only alert if closing speed > threshold
    },
    radar: {
        rangeMeters: 600,        // Radar display range
    }
};

// VRU type definitions
const VRU_TYPES = {
    HOR: { label: 'Horse',   icon: '🐴', color: '#ff8800', priority: 1 },
    CYC: { label: 'Cyclist', icon: '🚴', color: '#00aaff', priority: 2 },
    WAL: { label: 'Walker',  icon: '🚶', color: '#00ff88', priority: 3 },
    RUN: { label: 'Runner',  icon: '🏃', color: '#ffee00', priority: 4 },
    UNK: { label: 'User',    icon: '⚠️', color: '#ffffff', priority: 5 },
};

// ================================================================
//  STATE
// ================================================================
let mqttClient    = null;
let myLocation    = null;   // { lat, lon, heading, speed }
let vruMap        = {};     // uuid -> { lat, lon, type, lastSeen, lastAlerted }
let alertActive   = false;
let autoDismissTimer = null;
let wakeLock      = null;
let radarAnimFrame = null;

// ================================================================
//  UTILITIES
// ================================================================
function logMsg(msg) {
    console.log(msg);
    document.getElementById('log').textContent = '› ' + msg;
}

/**
 * Haversine distance in metres between two lat/lon points.
 */
function haversine(lat1, lon1, lat2, lon2) {
    const R  = 6371e3;
    const φ1 = lat1 * Math.PI / 180;
    const φ2 = lat2 * Math.PI / 180;
    const Δφ = (lat2 - lat1) * Math.PI / 180;
    const Δλ = (lon2 - lon1) * Math.PI / 180;
    const a  = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

/**
 * Compass bearing (0-360°) from point 1 to point 2.
 */
function bearing(lat1, lon1, lat2, lon2) {
    const φ1 = lat1 * Math.PI / 180;
    const φ2 = lat2 * Math.PI / 180;
    const Δλ = (lon2 - lon1) * Math.PI / 180;
    const y   = Math.sin(Δλ) * Math.cos(φ2);
    const x   = Math.cos(φ1)*Math.sin(φ2) - Math.sin(φ1)*Math.cos(φ2)*Math.cos(Δλ);
    return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}

/**
 * Smallest angular difference between two compass headings (-180 to 180).
 */
function angleDiff(a, b) {
    let d = ((b - a) + 540) % 360 - 180;
    return d;
}

/**
 * Human-readable relative direction ("ahead", "behind", "left", "right").
 */
function relativeDirection(driverHeading, bearingToVRU) {
    const diff = angleDiff(driverHeading, bearingToVRU);
    if (Math.abs(diff) <= 45)  return 'AHEAD';
    if (Math.abs(diff) >= 135) return 'BEHIND YOU';
    return diff < 0 ? 'ON YOUR LEFT' : 'ON YOUR RIGHT';
}

// ================================================================
//  SPEECH
// ================================================================
function speak(text) {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.rate   = 1.05;
    u.pitch  = 1.0;
    u.volume = 1.0;
    window.speechSynthesis.speak(u);
}

// ================================================================
//  GPS
// ================================================================
function startGPS() {
    if (!('geolocation' in navigator)) {
        logMsg('GPS not available in this browser.');
        return;
    }
    navigator.geolocation.watchPosition(
        (pos) => {
            const c = pos.coords;
            myLocation = {
                lat:     c.latitude,
                lon:     c.longitude,
                heading: c.heading  || null,  // degrees, null if not moving
                speed:   c.speed    !== null ? c.speed * 3.6 : 0,  // convert m/s to kph
            };

            // Update HUD
            document.getElementById('s-gps').textContent   = 'Locked';
            document.getElementById('s-gps').className     = 'pill-value status-ok';
            document.getElementById('s-speed').textContent = Math.round(myLocation.speed) + ' mph';
            document.getElementById('s-speed').className   = 'pill-value status-ok';

            if (myLocation.heading !== null) {
                document.getElementById('s-heading').textContent = Math.round(myLocation.heading) + '°';
                document.getElementById('s-heading').className   = 'pill-value status-ok';
            }

            // Every GPS update: prune stale VRUs and check proximity
            pruneStaleVRUs();
            checkAllVRUs();
        },
        (err) => {
            document.getElementById('s-gps').textContent = 'Error';
            document.getElementById('s-gps').className  = 'pill-value status-err';
            logMsg('GPS error: ' + err.message);
        },
        { enableHighAccuracy: true, maximumAge: 2000 }
    );
}

// ================================================================
//  VRU MANAGEMENT
// ================================================================

/**
 * Remove any VRU whose last update is older than TTL.
 */
function pruneStaleVRUs() {
    const now = Date.now();
    let changed = false;
    for (const uuid in vruMap) {
        if (now - vruMap[uuid].lastSeen > CONFIG.alert.vruTtlMs) {
            logMsg(`VRU ${uuid.slice(-6)} timed out — removed.`);
            delete vruMap[uuid];
            changed = true;
        }
    }
    if (changed) updateVRUCount();
}

function updateVRUCount() {
    document.getElementById('vru-count').textContent = Object.keys(vruMap).length;
}

/**
 * Called each time a new MQTT message arrives.
 * Expected payload JSON: { uuid, type, lat, lon }
 * type is one of: HOR, CYC, WAL, RUN
 */
function handleVRUMessage(payload) {
    let data;
    try {
        data = JSON.parse(payload);
    } catch (e) {
        logMsg('Bad payload — not valid JSON.');
        return;
    }

    if (!data.uuid || data.lat === undefined || data.lon === undefined) {
        logMsg('Payload missing required fields.');
        return;
    }

    const uuid = data.uuid;
    const now  = Date.now();

    // Preserve lastAlerted if VRU already exists
    const prev = vruMap[uuid] || {};
    vruMap[uuid] = {
        lat:         parseFloat(data.lat),
        lon:         parseFloat(data.lon),
        type:        data.type || 'UNK',
        lastSeen:    now,
        lastAlerted: prev.lastAlerted || 0,
    };

    updateVRUCount();

    // Immediately check this VRU on receipt of fresh data
    checkVRU(uuid, vruMap[uuid]);
}

// ================================================================
//  PROXIMITY & ALERT LOGIC
// ================================================================

function checkAllVRUs() {
    for (const uuid in vruMap) {
        checkVRU(uuid, vruMap[uuid]);
    }
}

function checkVRU(uuid, vru) {
    if (!myLocation) return;

    const now = Date.now();

    // 1. Speed gate — don't alert if essentially stationary
    if (myLocation.speed < CONFIG.alert.speedGateKph) return;

    // 2. Distance check
    const dist = Math.round(haversine(myLocation.lat, myLocation.lon, vru.lat, vru.lon));
    if (dist > CONFIG.alert.radiusMeters) return;

    // 3. Direction check — only alert if VRU is roughly ahead
    let dirLabel = 'AHEAD';
    if (myLocation.heading !== null) {
        const bear = bearing(myLocation.lat, myLocation.lon, vru.lat, vru.lon);
        const diff = Math.abs(angleDiff(myLocation.heading, bear));
        dirLabel = relativeDirection(myLocation.heading, bear);

        // Only alert if within the approach cone
        if (diff > CONFIG.alert.approachAngle) return;
    }

    // 4. Cooldown — don't re-alert for same VRU within cooldown window
    if (now - vru.lastAlerted < CONFIG.alert.cooldownMs) return;

    // 5. Fire the alert
    vruMap[uuid].lastAlerted = now;
    fireAlert(vru.type, dist, dirLabel);
}

// ================================================================
//  ALERT DISPLAY & AUDIO
// ================================================================

function fireAlert(type, distMeters, dirLabel) {
    if (alertActive) return; // Don't stack alerts

    const vruDef = VRU_TYPES[type] || VRU_TYPES.UNK;
    alertActive  = true;

    // Update overlay content
    document.getElementById('alert-icon').textContent     = vruDef.icon;
    document.getElementById('alert-type').textContent     = vruDef.label + ' Ahead';
    document.getElementById('alert-distance').textContent = distMeters + 'm';
    document.getElementById('alert-direction').textContent = '↑ ' + dirLabel;

    // Show overlay
    const overlay = document.getElementById('alert-overlay');
    overlay.classList.add('show');

    // Voice announcement
    speak(`Warning — ${vruDef.label} ${dirLabel.toLowerCase()}, ${distMeters} metres. Slow down.`);

    // Auto-dismiss countdown
    const fill = document.getElementById('countdown-fill');
    fill.style.transition = 'none';
    fill.style.width = '100%';
    // Trigger reflow then animate
    void fill.offsetWidth;
    fill.style.transition = `width ${CONFIG.alert.autoDismissMs}ms linear`;
    fill.style.width = '0%';

    autoDismissTimer = setTimeout(dismissAlert, CONFIG.alert.autoDismissMs);

    logMsg(`ALERT: ${vruDef.label} ${distMeters}m ${dirLabel}`);
}

function dismissAlert() {
    if (autoDismissTimer) clearTimeout(autoDismissTimer);
    document.getElementById('alert-overlay').classList.remove('show');
    alertActive = false;
    logMsg('Alert dismissed. Monitoring...');
}

// ================================================================
//  MQTT
// ================================================================
function startMQTT() {
    const clientId = 'driver-' + Math.random().toString(16).slice(2, 10);
    mqttClient = new Paho.MQTT.Client(
        CONFIG.mqtt.host,
        CONFIG.mqtt.port,
        CONFIG.mqtt.path,
        clientId
    );

    mqttClient.onConnectionLost = (resp) => {
        setMQTTStatus('Offline', 'err');
        logMsg('MQTT lost: ' + resp.errorMessage + ' — retrying...');
        setTimeout(startMQTT, CONFIG.mqtt.reconnectDelay);
    };

    mqttClient.onMessageArrived = (msg) => {
        handleVRUMessage(msg.payloadString);
    };

    mqttClient.connect({
        useSSL:    CONFIG.mqtt.useSSL,
        timeout:   5,
        onSuccess: () => {
            setMQTTStatus('Online', 'ok');
            mqttClient.subscribe(CONFIG.mqtt.topic);
            logMsg('Connected — monitoring for VRUs.');
        },
        onFailure: (err) => {
            setMQTTStatus('Failed', 'err');
            logMsg('MQTT failed: ' + err.errorMessage + ' — retrying...');
            setTimeout(startMQTT, CONFIG.mqtt.reconnectDelay);
        }
    });
}

function setMQTTStatus(text, state) {
    const el = document.getElementById('s-mqtt');
    el.textContent = text;
    el.className   = 'pill-value status-' + state;
}

// ================================================================
//  RADAR CANVAS
// ================================================================
function initRadar() {
    const canvas = document.getElementById('radar-canvas');
    // Make it square, device-pixel-ratio sharp
    const size = Math.min(canvas.parentElement.clientWidth, canvas.parentElement.clientHeight, 340);
    canvas.width  = size * window.devicePixelRatio;
    canvas.height = size * window.devicePixelRatio;
    canvas.style.width  = size + 'px';
    canvas.style.height = size + 'px';

    function drawRadar() {
        const ctx = canvas.getContext('2d');
        const dpr = window.devicePixelRatio;
        const w   = canvas.width;
        const h   = canvas.height;
        const cx  = w / 2;
        const cy  = h / 2;
        const r   = (w / 2) * 0.9;
        const heading = (myLocation && myLocation.heading) ? myLocation.heading : 0;

        ctx.clearRect(0, 0, w, h);

        // Background circle
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(0, 20, 35, 0.9)';
        ctx.fill();
        ctx.strokeStyle = 'rgba(0,200,255,0.2)';
        ctx.lineWidth = 1 * dpr;
        ctx.stroke();

        // Range rings (2 inner rings)
        [0.33, 0.66].forEach(f => {
            ctx.beginPath();
            ctx.arc(cx, cy, r * f, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(0,200,255,0.1)';
            ctx.lineWidth = 1 * dpr;
            ctx.stroke();
        });

        // Cross-hairs
        ctx.strokeStyle = 'rgba(0,200,255,0.1)';
        ctx.lineWidth = 1 * dpr;
        ctx.beginPath(); ctx.moveTo(cx, cy - r); ctx.lineTo(cx, cy + r); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx - r, cy); ctx.lineTo(cx + r, cy); ctx.stroke();

        // North label
        ctx.fillStyle = 'rgba(0,200,255,0.4)';
        ctx.font = `${10 * dpr}px 'Share Tech Mono', monospace`;
        ctx.textAlign = 'center';
        ctx.fillText('N', cx, cy - r + 14 * dpr);

        // Driver triangle (centre)
        const arrowSize = 10 * dpr;
        ctx.save();
        ctx.translate(cx, cy);
        ctx.fillStyle = '#00c8ff';
        ctx.shadowColor = '#00c8ff';
        ctx.shadowBlur = 10 * dpr;
        ctx.beginPath();
        ctx.moveTo(0, -arrowSize * 1.5);
        ctx.lineTo(-arrowSize, arrowSize);
        ctx.lineTo(arrowSize, arrowSize);
        ctx.closePath();
        ctx.fill();
        ctx.restore();

        // Draw VRUs
        const range = CONFIG.radar.rangeMeters;
        for (const uuid in vruMap) {
            const vru    = vruMap[uuid];
            if (!myLocation) continue;

            const dist   = haversine(myLocation.lat, myLocation.lon, vru.lat, vru.lon);
            if (dist > range) continue;

            const bear   = bearing(myLocation.lat, myLocation.lon, vru.lat, vru.lon);
            // Rotate relative to heading so "up" is always forward
            const relAngle = (bear - heading - 90) * Math.PI / 180;
            const scale    = (dist / range) * r * 0.88;

            const px = cx + Math.cos(relAngle) * scale;
            const py = cy + Math.sin(relAngle) * scale;

            const vruDef = VRU_TYPES[vru.type] || VRU_TYPES.UNK;

            // Glow dot
            ctx.save();
            ctx.shadowColor = vruDef.color;
            ctx.shadowBlur  = 12 * dpr;
            ctx.beginPath();
            ctx.arc(px, py, 6 * dpr, 0, Math.PI * 2);
            ctx.fillStyle = vruDef.color;
            ctx.fill();
            ctx.restore();

            // Icon
            ctx.font = `${14 * dpr}px serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(vruDef.icon, px, py - 16 * dpr);

            // Distance label
            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            ctx.font = `${9 * dpr}px 'Share Tech Mono', monospace`;
            ctx.fillText(Math.round(dist) + 'm', px, py + 14 * dpr);
        }

        radarAnimFrame = requestAnimationFrame(drawRadar);
    }

    drawRadar();
}

// ================================================================
//  WAKE LOCK
// ================================================================
async function requestWakeLock() {
    try {
        if ('wakeLock' in navigator) {
            wakeLock = await navigator.wakeLock.request('screen');
            logMsg('Wake lock active.');
        }
    } catch (e) {
        logMsg('Wake lock unavailable: ' + e.message);
    }
}

// Re-acquire wake lock when tab becomes visible again
document.addEventListener('visibilitychange', async () => {
    if (wakeLock !== null && document.visibilityState === 'visible') {
        try { wakeLock = await navigator.wakeLock.request('screen'); } catch (_) {}
    }
});

// ================================================================
//  STARTUP
// ================================================================
function startApp() {
    // Must be called from user gesture — initialises audio context
    speak('Road Alert activated. Monitoring for hazards.');

    // Transition screens
    const startup = document.getElementById('startup');
    startup.style.opacity = '0';
    setTimeout(() => { startup.style.display = 'none'; }, 600);

    const hud = document.getElementById('hud');
    hud.style.opacity = '0';
    hud.classList.add('visible');
    setTimeout(() => { hud.style.opacity = '1'; }, 650);

    logMsg('Initialising...');
    startGPS();
    startMQTT();
    requestWakeLock();
    initRadar();
}

// ================================================================
let tapCount = 0;
document.getElementById('radar-canvas')?.addEventListener('click', () => {
    tapCount++;
    if (tapCount >= 3) {
        tapCount = 0;
        fireAlert('HOR', 180, 'AHEAD');
    }
});
